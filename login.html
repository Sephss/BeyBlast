<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>BeyBlast — Login</title>
    <link rel="stylesheet" href="css/style.css" />
    <style>
      .login-error {
        color: var(--red);
        font-size: 0.88rem;
        margin-top: 0.5rem;
        display: none;
      }
    </style>
  </head>
  <body>
    <div class="arena-ring"></div>
    <div class="login-page">
      <div class="login-box">
        <div class="login-logo">BEY<span>BLAST</span></div>
        <p class="login-tagline">The ultimate Beyblade community platform</p>
        <div class="glow-line"></div>

        <button class="btn btn--google btn--full" id="btn-google">
          <img
            src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg"
            alt="Google"
          />
          Continue with Google
        </button>

        <div class="login-divider">or</div>

        <button class="btn btn--facebook btn--full" id="btn-facebook">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="#fff">
            <path
              d="M24 12.073c0-6.627-5.373-12-12-12s-12 5.373-12 12c0 5.99 4.388 10.954 10.125 11.854v-8.385H7.078v-3.47h3.047V9.43c0-3.007 1.792-4.669 4.533-4.669 1.312 0 2.686.235 2.686.235v2.953H15.83c-1.491 0-1.956.925-1.956 1.874v2.25h3.328l-.532 3.47h-2.796v8.385C19.612 23.027 24 18.062 24 12.073z"
            />
          </svg>
          Continue with Facebook
        </button>

        <p class="login-error" id="login-error"></p>

        <p style="margin-top: 1.5rem; font-size: 0.8rem; color: var(--text-3)">
          By signing in you agree to our terms of service.<br />
          A new account will be created on first login.
        </p>
      </div>
    </div>

    <script type="module">
      import {
        loginWithGoogle,
        loginWithFacebook,
        onAuthReady,
      } from "./js/auth.js";

      const errorEl = document.getElementById("login-error");
      function showErr(msg) {
        errorEl.textContent = msg;
        errorEl.style.display = "block";
      }

      document
        .getElementById("btn-google")
        .addEventListener("click", async () => {
          try {
            const user = await loginWithGoogle();

            console.log("User saved:", user);

            // ensure DB write is fully flushed
            await new Promise((r) => setTimeout(r, 200));

            window.location.href = "index.html";
          } catch (e) {
            console.error(e);
          }
        });

      document
        .getElementById("btn-facebook")
        .addEventListener("click", async () => {
          try {
            await loginWithFacebook();
            window.location.href = "index.html";
          } catch (e) {
            showErr(e.message);
          }
        });
    </script>
  </body>
</html>
