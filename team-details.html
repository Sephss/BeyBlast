<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>BeyBlast — Team</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <div class="arena-ring"></div>
  <nav class="nav" id="main-nav"></nav>

  <div class="page-wrap">
    <a href="teams.html" class="back-link">← Back to Teams</a>
    <div id="team-content">
      <div class="empty-state"><div class="bb-spinner" style="margin:0 auto;"></div></div>
    </div>
  </div>

  <script type="module">
    import { requireAuth } from "./js/auth.js";
    import { renderNav } from "./js/nav.js";
    import { getTeam, getTeamMembers, getTeamEvents, joinTeam, leaveTeam, deleteTeam } from "./js/teams.js";
    import { getMultipleUsers, getUserProfile } from "./js/profile.js";
    import { showToast, showConfirm, escHtml, avatarFallback, truncate } from "./js/ui.js";
    import { getParam, formatDate } from "./js/helpers.js";

    const user = await requireAuth();
    await renderNav("teams");

    const teamId = getParam("id");
    if (!teamId) { window.location.href = "teams.html"; }

    async function render() {
      const team = await getTeam(teamId);
      if (!team) { window.location.href = "teams.html"; return; }

      const members = await getTeamMembers(teamId);
      const events = await getTeamEvents(teamId);
      const uids = members.map(m => m.uid);
      const usersMap = await getMultipleUsers(uids);
      const joined = uids.includes(user.uid);
      const isCreator = team.createdBy === user.uid;

      let creatorProfile = await getUserProfile(team.createdBy).catch(() => null);

      document.title = `BeyBlast — ${team.name}`;
      const now = new Date().toISOString().split("T")[0];

      document.getElementById("team-content").innerHTML = `
        <div class="detail-hero">
          ${team.image ? `<img src="${escHtml(team.image)}" style="width:100%;max-height:200px;object-fit:cover;border-radius:10px;margin-bottom:1rem;" onerror="this.style.display='none'" />` : ''}
          <div style="display:flex;gap:.5rem;margin-bottom:.75rem;">
            ${joined ? '<span class="badge badge--cyan">✦ Member</span>' : ''}
            ${isCreator ? '<span class="badge badge--gold">Creator</span>' : ''}
          </div>
          <div class="detail-hero__title">${escHtml(team.name)}</div>
          <div class="detail-hero__meta">
            <span>👥 ${members.length} member${members.length!==1?'s':''}</span>
            <span>🔧 By ${escHtml(creatorProfile?.name||'Unknown')}</span>
            <span>◈ ${events.length} event${events.length!==1?'s':''}</span>
          </div>
          ${team.description?`<div class="detail-hero__desc">${escHtml(team.description)}</div>`:''}
          <div class="detail-hero__actions">
            ${!joined ? `<button class="btn btn--primary" id="btn-join-team">⚡ Join Team</button>` : ''}
            ${joined && !isCreator ? `<button class="btn btn--ghost" id="btn-leave-team">Leave Team</button>` : ''}
            ${isCreator ? `<button class="btn btn--danger btn--sm" id="btn-delete-team">Delete Team</button>` : ''}
          </div>
        </div>

        <div class="tabs">
          <button class="tab-btn tab-btn--active" data-tab="members">Members (${members.length})</button>
          <button class="tab-btn" data-tab="events">Events (${events.length})</button>
        </div>

        <div class="tab-panel tab-panel--active" id="tab-members">
          <div class="member-list">
            ${members.map(m => {
              const u = usersMap[m.uid] || {};
              const photo = u.photo || avatarFallback(u.name||'?');
              return `<div class="member-item">
                <img src="${photo}" class="avatar avatar--sm" alt="" onerror="this.src='${avatarFallback(u.name||'?')}'" />
                <div>
                  <div class="member-item__name">${escHtml(u.name||'Unknown')}</div>
                  <div class="member-item__email">${escHtml(u.email||'')}</div>
                </div>
                ${m.role==='creator'?'<span class="badge badge--gold" style="margin-left:auto;">Creator</span>':''}
              </div>`;
            }).join('')}
          </div>
        </div>

        <div class="tab-panel" id="tab-events">
          ${events.length===0
            ? `<div class="empty-state"><div class="empty-state__icon">◈</div><div class="empty-state__title">No team events yet</div></div>`
            : `<div class="grid grid--2">
              ${events.map(e=>`
                <div class="card event-card${e.date<now?' card--pink':''}" onclick="location.href='event-details.html?id=${e.eventId}'">
                  <div class="event-card__date">◈ ${e.date}</div>
                  <div class="event-card__title">${escHtml(e.title)}</div>
                  <div style="font-size:.85rem;color:var(--text-2);">${escHtml(truncate(e.description,60))}</div>
                </div>
              `).join('')}
            </div>`
          }
        </div>
      `;

      // Tabs
      document.querySelectorAll(".tab-btn").forEach(btn => {
        btn.addEventListener("click", () => {
          document.querySelectorAll(".tab-btn").forEach(b => b.classList.remove("tab-btn--active"));
          document.querySelectorAll(".tab-panel").forEach(p => p.classList.remove("tab-panel--active"));
          btn.classList.add("tab-btn--active");
          document.getElementById(`tab-${btn.dataset.tab}`).classList.add("tab-panel--active");
        });
      });

      document.getElementById("btn-join-team")?.addEventListener("click", async () => {
        try {
          await joinTeam(teamId, user.uid);
          showToast("Joined team!", "success");
          await render();
        } catch (e) { showToast(e.message, "error"); }
      });

      document.getElementById("btn-leave-team")?.addEventListener("click", () => {
        showConfirm("Leave Team", "Are you sure you want to leave this team?", async () => {
          try {
            await leaveTeam(teamId, user.uid);
            showToast("Left team.", "success");
            await render();
          } catch (e) { showToast(e.message, "error"); }
        });
      });

      document.getElementById("btn-delete-team")?.addEventListener("click", () => {
        showConfirm("Delete Team", "Delete this team and all memberships permanently?", async () => {
          try {
            await deleteTeam(teamId);
            showToast("Team deleted.", "success");
            window.location.href = "teams.html";
          } catch (e) { showToast(e.message, "error"); }
        });
      });
    }

    await render();
  </script>
</body>
</html>
